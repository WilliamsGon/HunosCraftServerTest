
[fast_travel]
	#Internal config version used by the mod for future migrations. Current version: 3
	#Range: > 1
	config_version = 2
	#How many XP levels are consumed when a player fast-travels to a waystone waypoint. 0 = free.
	#Range: 0 ~ 1000
	level_cost = 0
	#If true, players must be near any Waystone before they can start fast travel from the world map.
	require_nearby_waystone_for_use = true
	#How close the player must be to any Waystone to start fast travel when require_nearby_waystone_for_use=true. Measured in blocks. Default: 7
	#Range: 1 ~ 64
	nearby_waystone_use_radius = 7
	#If true, remove the 3-second teleport countdown whenever the player is currently within nearby_waystone_use_radius blocks of any Waystone.
	disable_countdown_when_near_a_waystone = true
	#If true, remove the 3-second teleport countdown for map teleports when the player is not currently within nearby_waystone_use_radius blocks of any Waystone.
	disable_countdown_for_teleporting_from_anywhere = false
	#If true, players can only fast-travel when they have open sky above them (ignores leaves, fluids, and transparent blocks like glass). Checked at the player position.
	require_open_sky_player = false
	#If true, players can only fast-travel to waystones that have open sky above the destination area. Uses the same open_sky_dimension_whitelist as require_open_sky_player.
	require_open_sky_destination = false
	#When require_open_sky_player=true or require_open_sky_destination=true, only enforce it in these dimensions (resource locations). Default: overworld + the_end. Example: ["minecraft:overworld", "minecraft:the_end"]
	open_sky_dimension_whitelist = ["minecraft:overworld", "minecraft:the_end"]
	#Enable restricting fast travel based on the player's current Y level.
	enable_min_y_check = false
	#Minimum Y level required to start fast travel (only used when enable_min_y_check=true).
	#Range: -64 ~ 320
	min_y = 60
	#If true, players can fast-travel to waystone waypoints in other dimensions using Xaero World Map's dimension toggle. If false, only same-dimension fast travel is allowed.
	enable_cross_dimensional_travel = true
	#Additional XP levels consumed only when fast-traveling between dimensions. This is added on top of level_cost. 0 = no extra cross-dimensional cost.
	#Range: 0 ~ 1000
	additional_level_cost_dimensional_travel = 0

